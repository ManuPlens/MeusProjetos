<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grouping tags</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
    }
    header {
      width: 100%;
      background-color: whitesmoke;
      
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: rgb(255, 201, 201);
      padding: 10px 0;
      box-shadow: 1px 1px 1px rgba(255, 0, 0, 0.61);
    }
    footer {
      width: 100%;
      background-color: rgb(109, 109, 109);
      text-align: center;
      padding: 10px 0;
      position: fixed;
      bottom: 0;
      
    }
  </style>
</head>
<body>
  
  <header>
    <h1>Meu site</h1>
    <nav>
      <ul>
        <a href="#">Home</a>
        <a href="#">Sobre</a>
        <a href="#">Contato</a>
      </ul>
    </nav>
  </header>

  <main>
    <section id="conteudo-principal">
      <h2>Bem-vindo ao meu site</h2>
      <p>Este é o conteúdo principal do site.</p>
    </section>

    <section id="secundario">
      <h2>Seção Secundária</h2>
      <p>Este é o conteúdo secundário do site.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2023 Emanuelly Plens. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
