<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa</title>
  <style>
    h1 {
      text-align: center;
      color: rgb(4, 0, 255);
      background-color: aqua;
      height: 50px;
      width: 380px;
      border: 10px solid red;
      margin: auto;

      padding-top: 10px;
      padding-right:10px;
      padding-bottom: 5px;
      padding-left: 10px;

      margin-bottom: 60px;

      outline: 10px dashed pink;
    }
    a {
      border-width: 10px;
      border-style: groove;
      border-color: blue;
    }
  </style>
</head>
<body>
  <h1>Exemplo de caixa box-level</h1>
  <p>Paragrafos tambem são exemplos de box-level, mas os <a href="#"> links são exemplo de caixa inline-level.</a>Vamos ver como tudo isso funciona</p>
</body>
</html>
